<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Minimalist white background -->
  <rect width="100" height="100" rx="20" fill="#ffffff"/>
  
  <!-- Lichess-style Queen Piece -->
  <g fill="#171717" stroke="#171717" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- Crown Points (Balls) -->
    <circle cx="20" cy="34" r="3.5" />
    <circle cx="34" cy="22" r="4" />
    <circle cx="50" cy="16" r="4.5" />
    <circle cx="66" cy="22" r="4" />
    <circle cx="80" cy="34" r="3.5" />

    <!-- Crown -->
    <path d="M 20 34
             L 29 44
             L 34 22
             L 42 41
             L 50 16
             L 58 41
             L 66 22
             L 71 44
             L 80 34
             L 75 50
             C 65 56 35 56 25 50
             Z" />

    <!-- Body -->
    <path d="M 26 49
             C 40 55 60 55 74 49
             C 65 62 62 70 76 76
             L 24 76
             C 38 70 35 62 26 49
             Z" />

    <!-- Base Rings -->
    <rect x="22" y="77" width="56" height="4" rx="2" />
    <path d="M 16 88 C 16 83 22 81 26 81 L 74 81 C 78 81 84 83 84 88 C 84 92 78 94 74 94 L 26 94 C 22 94 16 92 16 88 Z" />
  </g>
  
  <!-- Lichess-style white accent cuts -->
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Crown/Body Separator -->
    <path d="M 26 50 C 40 56 60 56 74 50" />
    
    <!-- Body/Base Separator -->
    <path d="M 24 76.5 L 76 76.5" />
    
    <!-- Base accent -->
    <path d="M 20 86.5 C 30 87.5 70 87.5 80 86.5" stroke-width="1.5" />
  </g>
</svg>
