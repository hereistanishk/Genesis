<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Minimalist white background with round corners -->
  <rect width="100" height="100" rx="22" fill="#ffffff"/>
  
  <!-- Cute Round Bishop Piece Silhouette -->
  <g fill="#171717" stroke="#171717" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top Ball -->
    <circle cx="50" cy="20" r="5" />
    
    <!-- Bishop Head (Miter) -->
    <path d="M 50 26 
             C 72 26, 72 46, 66 54
             C 60 62, 54 62, 50 62
             C 46 62, 40 62, 34 54
             C 28 46, 28 26, 50 26 Z" />
             
    <!-- Collar -->
    <rect x="36" y="62" width="28" height="6" rx="3" />
    
    <!-- Body -->
    <path d="M 40 68 
             C 40 78, 28 80, 26 84 
             L 74 84 
             C 72 80, 60 78, 60 68 Z" />
             
    <!-- Base -->
    <rect x="20" y="86" width="60" height="8" rx="4" />
  </g>

  <!-- The Bishop Slit (Diagonal cut) -->
  <line x1="56" y1="34" x2="42" y2="48" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
</svg>
